<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mia by Tanishq — Gleam Play Diamond Ring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Albert Sans', sans-serif;
            background: #FAFAFA;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            font-size: 14px;
            overflow-x: hidden;
        }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input, select, textarea { font-family: inherit; }
        img { display: block; max-width: 100%; }
        a { text-decoration: none; color: inherit; }
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }

        /* ===== TYPOGRAPHY ===== */
        .font-display { font-family: 'Fraunces', serif; }
        .font-body { font-family: 'Albert Sans', sans-serif; }

        /* ===== SECTION SPACING ===== */
        .section-gap { margin-top: 8px; }

        /* ===== 1. APP DOWNLOAD NUDGE ===== */
        .app-nudge {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px;
            background: #FDF2F4;
            border-bottom: 1px solid rgba(209,74,97,0.1);
            position: relative;
            animation: slideDown 0.4s ease;
        }
        .app-nudge.hidden { display: none; }
        .app-nudge-icon { width: 36px; height: 36px; border-radius: 10px; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-shrink: 0; }
        .app-nudge-text { flex: 1; min-width: 0; }
        .app-nudge-text strong { font-size: 12px; font-weight: 700; color: #1a1a1a; display: block; }
        .app-nudge-text span { font-size: 10px; color: #777; }
        .app-nudge-install { padding: 6px 14px; border-radius: 100px; background: #D14A61; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; transition: transform 0.2s; }
        .app-nudge-install:active { transform: scale(0.95); }
        .app-nudge-close { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            padding: 10px 16px;
            display: flex; align-items: center; gap: 4px;
            font-size: 11px; color: #999;
            overflow-x: auto; white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .breadcrumb::-webkit-scrollbar { display: none; }
        .breadcrumb a { color: #777; transition: color 0.15s; }
        .breadcrumb a:hover { color: #D14A61; }
        .breadcrumb .sep { color: #ccc; margin: 0 2px; }
        .breadcrumb .current { color: #1a1a1a; font-weight: 600; }

        /* ===== 2. IMAGE GALLERY ===== */
        .gallery-section { position: relative; background: #fff; }
        .gallery-main {
            position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        .gallery-track {
            display: flex; height: 100%; transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .gallery-track.dragging { transition: none; }
        .gallery-slide { min-width: 100%; height: 100%; position: relative; }
        .gallery-slide img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-thumbnails {
            display: flex; gap: 8px; padding: 12px 16px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        .gallery-thumbnails::-webkit-scrollbar { display: none; }
        .gallery-thumb {
            width: 56px; height: 56px; border-radius: 10px; overflow: hidden;
            border: 2px solid transparent; flex-shrink: 0; transition: all 0.2s;
            cursor: pointer;
        }
        .gallery-thumb.active { border-color: #D14A61; }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* ===== 3. WISHLIST ON IMAGE ===== */
        .wishlist-float {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .wishlist-float:active { transform: scale(0.9); }
        .wishlist-float.active svg { fill: #D14A61; stroke: #D14A61; }

        /* ===== 4. PRODUCT HEADER ===== */
        .product-header { padding: 16px 16px 0; }
        .product-name-row { display: flex; align-items: flex-start; gap: 12px; }
        .product-name {
            font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500;
            color: #1a1a1a; line-height: 1.3; flex: 1; letter-spacing: -0.3px;
        }
        .share-btn {
            width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
            background: #f5f5f5; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .share-btn:active { transform: scale(0.9); background: #eee; }
        .review-stars { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
        .stars-row { display: flex; gap: 2px; }
        .stars-row svg { width: 14px; height: 14px; }
        .review-count { font-size: 12px; color: #777; }

        /* ===== 5. KEY HIGHLIGHTS ===== */
        .key-highlights {
            padding: 14px; margin: 12px 16px; border-radius: 16px;
            background: #fff; border: 1px solid #f0f0f0;
        }
        .highlights-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        @media (max-width: 359px) {
            .highlights-grid { grid-template-columns: 1fr; }
        }
        .highlight-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: 12px; background: #FAFAFA;
            min-width: 0;
        }
        .highlight-icon {
            width: 28px; height: 28px; min-width: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .highlight-icon.gold-bg { background: rgba(184,134,11,0.1); }
        .highlight-icon.diamond-bg { background: rgba(209,74,97,0.1); }
        .highlight-icon.general-bg { background: rgba(59,130,246,0.08); }
        .highlight-text { min-width: 0; overflow: hidden; }
        .highlight-text .hl-value { font-size: 11px; font-weight: 700; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .highlight-text .hl-label { font-size: 9px; color: #999; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* Gold shimmer */
        .gold-shimmer {
            background: linear-gradient(90deg, #b8860b 0%, #b8860b 30%, #f5d77a 45%, #fff8dc 50%, #f5d77a 55%, #b8860b 70%, #b8860b 100%);
            background-size: 250% auto;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        /* Diamond sparkle */
        .diamond-sparkle {
            background: linear-gradient(90deg, #1a1a1a 0%, #1a1a1a 30%, #D14A61 42%, #ff8fa3 50%, #D14A61 58%, #1a1a1a 70%, #1a1a1a 100%);
            background-size: 250% auto;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3.5s linear infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .warranty-row {
            display: flex; align-items: center; gap: 8px; margin-top: 12px;
            padding: 10px 12px; border-radius: 10px; background: #f0fdf4;
            border: 1px solid rgba(34,197,94,0.15);
        }
        .warranty-row span { font-size: 11px; font-weight: 600; color: #15803d; }
        .view-full-details-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; margin-top: 12px; padding: 10px;
            font-size: 12px; font-weight: 600; color: #D14A61;
            border: 1px dashed rgba(209,74,97,0.3); border-radius: 10px;
            transition: all 0.2s; background: rgba(209,74,97,0.03);
        }
        .view-full-details-btn:active { background: rgba(209,74,97,0.08); }

        /* ===== FULL PRODUCT DETAILS (expandable) ===== */
        .full-details-panel {
            max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0 16px; background: #fff; border-radius: 0 0 16px 16px;
        }
        .full-details-panel.open { max-height: 3000px; }
        .full-details-inner { padding: 16px; border: 1px solid #f0f0f0; border-top: none; border-radius: 0 0 16px 16px; }
        .detail-category { margin-bottom: 16px; }
        .detail-category:last-child { margin-bottom: 0; }
        .detail-cat-title {
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; margin-bottom: 8px; padding-bottom: 6px;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-cat-title.gold-title { color: #b8860b; }
        .detail-cat-title.diamond-title { color: #D14A61; }
        .detail-cat-title.gemstone-title { color: #7c3aed; }
        .detail-cat-title.general-title { color: #555; }
        .detail-rows { display: flex; flex-direction: column; gap: 0; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; gap: 12px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-row .dl { font-size: 12px; color: #777; flex-shrink: 0; }
        .detail-row .dv { font-size: 12px; font-weight: 600; color: #1a1a1a; text-align: right; word-break: break-word; }
        .product-description {
            margin-top: 16px; padding-top: 12px; border-top: 1px solid #f0f0f0;
            font-size: 13px; line-height: 1.7; color: #555;
        }

        /* ===== 6. TRUST ELEMENTS ===== */
        .trust-elements {
            display: flex; align-items: stretch; justify-content: center; gap: 0;
            padding: 0; margin: 12px 16px;
            background: #fff; border-radius: 12px; border: 1px solid #f0f0f0;
            overflow: hidden;
        }
        .trust-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; padding: 14px 8px;
            border-right: 1px solid #f0f0f0;
        }
        .trust-item:last-child { border-right: none; }
        .trust-item img { height: 18px; width: auto; object-fit: contain; }
        .trust-item span { display: none; }

        /* ===== 7. PRICE SECTION ===== */
        .price-section { padding: 16px; margin: 12px 16px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0; }
        .price-main-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .price-current { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; color: #1a1a1a; }
        .price-original { font-size: 14px; color: #999; text-decoration: line-through; }
        .price-discount { font-size: 12px; font-weight: 700; color: #22C55E; background: rgba(34,197,94,0.08); padding: 2px 8px; border-radius: 100px; }
        .price-tax { font-size: 11px; color: #999; margin-top: 4px; }
        /* Price breakup accordion */
        .price-breakup-toggle {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; margin-top: 14px; padding: 10px 14px;
            border-radius: 10px; background: #FAFAFA; border: 1px solid #f0f0f0;
            transition: all 0.2s;
        }
        .price-breakup-toggle span { font-size: 12px; font-weight: 600; color: #555; }
        .price-breakup-toggle svg { transition: transform 0.3s; }
        .price-breakup-toggle.open svg { transform: rotate(180deg); }
        .price-breakup-panel {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .price-breakup-panel.open { max-height: 600px; }
        .breakup-content { padding: 12px 0 0; }
        .breakup-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .breakup-row:last-child { border-bottom: none; }
        .breakup-label { font-size: 12px; color: #777; }
        .breakup-sub { font-size: 10px; color: #aaa; margin-top: 2px; }
        .breakup-value { font-size: 12px; font-weight: 700; color: #1a1a1a; text-align: right; }
        .breakup-total { border-top: 2px solid #f0f0f0; margin-top: 4px; padding-top: 12px; }
        .breakup-total .breakup-label { font-weight: 700; color: #1a1a1a; font-size: 13px; }
        .breakup-total .breakup-value { font-size: 15px; color: #1a1a1a; }

        /* Weight & Size Selection */
        .selection-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
        .selection-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; margin-bottom: 10px; }
        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .pill {
            padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 600;
            border: 1.5px solid #e0e0e0; background: #fff; color: #555;
            transition: all 0.2s; position: relative;
        }
        .pill.active { border-color: #D14A61; background: #FDF2F4; color: #D14A61; }
        .pill.out-of-stock { opacity: 0.4; border-style: dashed; pointer-events: none; position: relative; }
        .pill.out-of-stock::after { content: ''; position: absolute; top: 50%; left: 10%; right: 10%; height: 1px; background: #999; }
        .pill.notify-me { opacity: 0.5; border-style: dashed; cursor: pointer; pointer-events: all; }
        .pill:active:not(.out-of-stock) { transform: scale(0.95); }
        .size-guide-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .size-guide-btn { font-size: 11px; font-weight: 600; color: #D14A61; display: flex; align-items: center; gap: 4px; text-decoration: underline; text-underline-offset: 2px; }

        /* ===== 8. EXCHANGE GOLD ===== */
        .exchange-section {
            padding: 16px; margin: 8px 16px; background: #fff; border-radius: 16px;
            border: 1px solid #f0f0f0;
        }
        .exchange-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .exchange-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #fef3cd, #fde68a); display: flex; align-items: center; justify-content: center; }
        .exchange-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .exchange-subtitle { font-size: 11px; color: #777; }
        .exchange-rate { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 8px; background: #fffbeb; border: 1px solid rgba(245,158,11,0.15); margin-bottom: 12px; }
        .exchange-rate span { font-size: 11px; color: #92400e; }
        .exchange-rate strong { font-weight: 700; }
        .exchange-cta {
            width: 100%; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600;
            color: #92400e; background: linear-gradient(135deg, #fef3cd, #fde68a);
            border: 1px solid rgba(184,134,11,0.2); transition: all 0.2s;
        }
        .exchange-cta:active { transform: scale(0.98); }

        /* ===== 9. COUPONS ===== */
        .coupons-section { padding: 16px; margin: 8px 16px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0; }
        .coupons-title { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .coupon-card {
            padding: 12px; border-radius: 12px; border: 1px dashed #e0e0e0;
            margin-bottom: 8px; position: relative; overflow: hidden;
        }
        .coupon-card:last-child { margin-bottom: 0; }
        .coupon-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 0 4px 4px 0; }
        .coupon-card.primary::before { background: #D14A61; }
        .coupon-card.birthday::before { background: #F59E0B; }
        .coupon-card.anniversary::before { background: #7c3aed; }
        .coupon-top { display: flex; align-items: center; justify-content: space-between; }
        .coupon-code { font-size: 12px; font-weight: 800; letter-spacing: 1px; color: #D14A61; background: #FDF2F4; padding: 3px 8px; border-radius: 4px; }
        .coupon-code.gold { color: #92400e; background: #fef3cd; }
        .coupon-code.purple { color: #6d28d9; background: #f3e8ff; }
        .coupon-desc { font-size: 12px; color: #555; margin-top: 6px; line-height: 1.4; }
        .coupon-apply { font-size: 11px; font-weight: 700; color: #D14A61; margin-top: 6px; }

        /* ===== 10. PROMOTIONS ===== */
        .promos-section { padding: 16px; margin: 8px 16px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0; overflow: hidden; }
        .promos-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .promos-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 100px; background: #D14A61; color: #fff; }
        .promos-title { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .promos-subtitle { font-size: 11px; color: #777; margin-bottom: 14px; }
        .promo-tiers { display: flex; flex-direction: column; gap: 6px; }
        .promo-tier {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 10px;
            background: #FAFAFA; border: 1px solid #f0f0f0;
            transition: all 0.2s;
        }
        .promo-tier.active-tier { background: #FDF2F4; border-color: rgba(209,74,97,0.3); }
        .promo-tier-badge { font-size: 18px; font-weight: 800; color: #D14A61; font-family: 'Fraunces', serif; min-width: 50px; }
        .promo-tier-info { flex: 1; min-width: 0; }
        .promo-tier-label { font-size: 11px; font-weight: 600; color: #1a1a1a; }
        .promo-tier-desc { font-size: 10px; color: #777; }
        .promo-qty-bonus { margin-top: 12px; padding: 10px 12px; border-radius: 10px; background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 1px solid rgba(34,197,94,0.2); }
        .promo-qty-bonus p { font-size: 11px; color: #166534; font-weight: 600; }
        .promo-qty-bonus span { font-size: 10px; color: #15803d; }

        /* ===== 11. GIFT OPTION ===== */
        .gift-section { padding: 16px; margin: 8px 16px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0; }
        .gift-toggle-row { display: flex; align-items: center; justify-content: space-between; }
        .gift-label { display: flex; align-items: center; gap: 8px; }
        .gift-label span { font-size: 13px; font-weight: 600; color: #1a1a1a; }
        .gift-label small { font-size: 10px; color: #777; }
        .toggle-switch {
            position: relative; width: 44px; height: 24px; border-radius: 100px;
            background: #e0e0e0; transition: background 0.3s; cursor: pointer;
        }
        .toggle-switch.active { background: #D14A61; }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px; border-radius: 50%;
            background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(20px); }
        .gift-selected-badge { display: none; margin-top: 10px; padding: 8px 12px; border-radius: 8px; background: #FDF2F4; font-size: 11px; color: #D14A61; font-weight: 600; }
        .gift-selected-badge.show { display: flex; align-items: center; gap: 6px; }

        /* ===== 12. FLOATING STICKY BAR ===== */
        .sticky-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            padding: 10px 16px; padding-bottom: max(10px, env(safe-area-inset-bottom));
            background: rgba(255,255,255,0.97); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        }
        .sticky-bar-size { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .sticky-bar-size::-webkit-scrollbar { display: none; }
        .sticky-size-label { font-size: 10px; font-weight: 700; color: #777; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; margin-right: 4px; }
        .sticky-size-pill { padding: 4px 10px; border-radius: 100px; font-size: 10px; font-weight: 600; border: 1px solid #e0e0e0; color: #555; white-space: nowrap; transition: all 0.15s; }
        .sticky-size-pill.active { border-color: #D14A61; background: #FDF2F4; color: #D14A61; }
        .sticky-btns { display: flex; gap: 10px; }
        .btn-buy-now {
            flex: 1; padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 700;
            color: #D14A61; background: #FDF2F4; border: 1.5px solid #D14A61;
            transition: all 0.2s; text-align: center;
        }
        .btn-buy-now:active { transform: scale(0.98); }
        .btn-add-cart {

(function() {
    var track = document.getElementById("galleryTrack");
    var thumbs = document.getElementById("galleryThumbs");
    var startX = 0, currentX = 0, isDragging = false;

    function renderGallery() {
        track.innerHTML = product.images.map(function(src, i) {
            return '<div class="gallery-slide"><img src="' + src + '" alt="View ' + (i + 1) + '" draggable="false" loading="' + (i < 2 ? 'eager' : 'lazy') + '"></div>';
        }).join("");
        track.style.transform = "translateX(-" + (state.currentSlide * 100) + "%)";

        thumbs.innerHTML = product.images.map(function(src, i) {
            return '<button class="gallery-thumb' + (i === state.currentSlide ? ' active' : '') + '" data-idx="' + i + '"><img src="' + src + '" alt="Thumb ' + (i + 1) + '" loading="lazy"></button>';
        }).join("");
    }
    renderGallery();

    thumbs.addEventListener("click", function(e) {
        var btn = e.target.closest("[data-idx]");
        if (btn) { state.currentSlide = parseInt(btn.dataset.idx); renderGallery(); }
    });

    // Touch swipe
    var mainEl = document.getElementById("galleryMain");
    mainEl.addEventListener("touchstart", function(e) { startX = e.touches[0].clientX; isDragging = true; track.classList.add("dragging"); }, { passive: true });
    mainEl.addEventListener("touchmove", function(e) {
        if (!isDragging) return;
        currentX = e.touches[0].clientX;
        var diff = currentX - startX;
        var offset = -(state.currentSlide * mainEl.offsetWidth) + diff;
        track.style.transform = "translateX(" + offset + "px)";
    }, { passive: true });
    mainEl.addEventListener("touchend", function() {
        isDragging = false; track.classList.remove("dragging");
        var diff = currentX - startX;
        if (diff > 50 && state.currentSlide > 0) state.currentSlide--;
        else if (diff < -50 && state.currentSlide < product.images.length - 1) state.currentSlide++;
        currentX = 0; startX = 0;
        renderGallery();
    });
})();

    h += '</div></div>';

    h += '<div id="sizeResult" style="display:none;text-align:center;padding:12px;border-radius:10px;background:#FDF2F4;margin-bottom:16px"><p style="font-size:10px;color:#777;margin-bottom:2px">Your Ring Size</p><p style="font-size:20px;font-weight:700;color:#D14A61;font-family:Fraunces,serif" id="sizeResultValue">—</p></div>';
    // Size chart table
    h += '<div style="margin-top:8px"><p style="font-size:10px;font-weight:700;color:#999;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Size Chart</p><table style="width:100%;font-size:12px;border-collapse:collapse">';
    h += '<thead><tr><th style="text-align:left;padding:8px 6px;font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #f0f0f0">Circumference</th><th style="text-align:center;padding:8px 6px;font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #f0f0f0">Ring Size</th><th style="text-align:right;padding:8px 6px;font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #f0f0f0">Status</th></tr></thead><tbody>';
    product.sizes.forEach(function(s) { h += '<tr><td style="padding:10px 6px;border-bottom:1px solid #f8f8f8;font-weight:500">' + s.circumference + '</td><td style="padding:10px 6px;border-bottom:1px solid #f8f8f8;font-weight:700;color:#1a1a1a;text-align:center">' + s.label + '</td><td style="padding:10px 6px;border-bottom:1px solid #f8f8f8;text-align:right"><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;' + (s.inStock ? 'color:#166534;background:#f0fdf4' : 'color:#991b1b;background:#fef2f2') + '">' + (s.inStock ? 'In Stock' : 'Sold Out') + '</span></td></tr>'; });
    h += '</tbody></table></div>';
    h += '<p style="font-size:10px;color:#999;margin-top:14px;line-height:1.6;text-align:center">Tip: Measure at the end of the day when fingers are slightly larger. Add 1–2mm for comfort fit.</p>';
    body.innerHTML = h;
    // Size calculator logic
    var sizeMap = product.sizes.map(function(s) { return { circ: parseFloat(s.circumference), label: s.label }; });
    document.getElementById('sizeInput').oninput = function() {

        resultVal.textContent = closest.label;
    };
}

    var rates = { "24": product.goldRate.rate24kt, "22": product.goldRate.rate22kt, "18": product.goldRate.rate18kt, "14": product.goldRate.rate14kt, "9": product.goldRate.rate9kt };
    document.getElementById("exchKarat").onchange = function() {
        var disp = document.getElementById("exchRateDisplay");
        if (this.value && rates[this.value]) { disp.style.display = "block"; disp.textContent = "Today's " + this.value + " KT rate: ₹" + rates[this.value].toLocaleString("en-IN") + "/gm"; }
        else { disp.style.display = "none"; }
    };
    document.getElementById("exchCalcBtn").onclick = function() {
        var k = document.getElementById("exchKarat").value, w = document.getElementById("exchWeight").value;
        if (!k || !w) return;
        document.getElementById("exchLeadForm").style.display = "block";
        this.style.display = "none";
    };
    document.getElementById("exchSubmitBtn").onclick = function() {
        var name = document.getElementById("exchName").value, phone = document.getElementById("exchPhone").value;
        if (!name || phone.length !== 10) return;
        var k = document.getElementById("exchKarat").value, w = parseFloat(document.getElementById("exchWeight").value);
        var value = rates[k] * w;
        document.getElementById("exchValue").textContent = fmt(Math.round(value));
        document.getElementById("exchResult").style.display = "block";
        document.getElementById("exchLeadForm").style.display = "none";
    };
}
