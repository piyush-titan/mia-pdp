<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mia by Tanishq — Gleam Play Diamond Ring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Albert Sans', sans-serif;
            background: #FAFAFA;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            font-size: 14px;
            overflow-x: hidden;
        }
        /* Force consistent colors - no browser blue defaults */
        svg { color: inherit; }
        [data-lucide] { color: #1a1a1a; }
        button, a, input, select, textarea, option { color: #1a1a1a; }
        select option { color: #1a1a1a; }
        ::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb; }
        input, select, textarea { -webkit-text-fill-color: #1a1a1a; color: #1a1a1a; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input, select, textarea { font-family: inherit; }
        img { display: block; max-width: 100%; }
        a { text-decoration: none; color: inherit; }
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }
        .font-display { font-family: 'Fraunces', serif; }

        /* ===== TOAST / NUDGE SYSTEM ===== */
        .toast-container {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; padding-top: 12px; gap: 8px;
        }
        .toast {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 20px; border-radius: 14px;
            font-size: 13px; font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transform: translateY(-100%); opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto; max-width: calc(100vw - 32px);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: rgba(240,253,244,0.95); color: #166534; border: 1px solid rgba(34,197,94,0.2); }
        .toast.error { background: rgba(254,242,242,0.95); color: #991b1b; border: 1px solid rgba(239,68,68,0.2); }
        .toast.info { background: rgba(253,242,244,0.95); color: #9f1239; border: 1px solid rgba(209,74,97,0.2); }
        .toast i { width: 18px; height: 18px; flex-shrink: 0; }

        /* ===== APP DOWNLOAD NUDGE ===== */
        .app-nudge {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 14px; background: #FDF2F4;
            border-bottom: 1px solid rgba(209,74,97,0.1);
            animation: slideDown 0.4s ease;
        }
        .app-nudge.hidden { display: none; }
        .app-nudge-icon { width: 28px; height: 28px; border-radius: 8px; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-shrink: 0; }
        .app-nudge-text { flex: 1; min-width: 0; line-height: 1.2; }
        .app-nudge-text strong { font-size: 12px; font-weight: 700; color: #1a1a1a; display: block; margin-bottom: -1px; }
        .app-nudge-text span { font-size: 10px; color: #777; }
        .app-nudge-install { padding: 6px 14px; border-radius: 100px; background: #D14A61; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; transition: transform 0.2s; }
        .app-nudge-install:active { transform: scale(0.95); }
        .app-nudge-close { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            padding: 10px 16px; display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: #999; overflow-x: auto; white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .breadcrumb::-webkit-scrollbar { display: none; }
        .breadcrumb a { color: #555; font-weight: 500; transition: color 0.15s; }
        .breadcrumb a:hover { color: #D14A61; }
        .breadcrumb .sep { color: #999; display: flex; align-items: center; }
        .breadcrumb .sep svg { width: 7px; height: 7px; }
        .breadcrumb .current { color: #1a1a1a; font-weight: 600; }

        /* ===== IMAGE GALLERY ===== */
        .gallery-section { position: relative; background: #fff; }
        .similar-float {
            position: absolute; top: 12px; right: 12px; z-index: 15;
            display: flex; align-items: center; gap: 5px;
            padding: 7px 12px; border-radius: 100px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .similar-float:active { transform: scale(0.93); }
        .similar-float span { font-size: 10px; font-weight: 700; color: #D14A61; letter-spacing: 0.3px; }
        .product-tag {
            position: absolute; top: 12px; left: 12px; z-index: 15;
            padding: 7px 12px;
            font-size: 8px; font-weight: 800; letter-spacing: 1.2px;
            text-transform: uppercase; color: #fff;
            -webkit-clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
            clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
            border: 0 solid; overflow: hidden;
        }
        .product-tag::after {
            content: ''; position: absolute; top: -50%; left: -75%; width: 50%; height: 200%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.5) 45%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.5) 55%, transparent 60%);
            animation: tagShimmer 3s ease-in-out infinite;
        }
        @keyframes tagShimmer { 0% { left: -75%; } 100% { left: 150%; } }
        .product-tag.new-arrival { background: linear-gradient(135deg, #b8860b, #f5d77a); color: #5c3d0a; }
        .product-tag.bestseller { background: linear-gradient(135deg, #D14A61, #f9a8b8); color: #fff; }
        .product-tag.custom { background: linear-gradient(135deg, #7c3aed, #c4b5fd); color: #fff; }
        .gallery-main {
            position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        .gallery-track {
            display: flex; height: 100%;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .gallery-track.dragging { transition: none; }
        .gallery-slide { min-width: 100%; height: 100%; }
        .gallery-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Round circle thumbnails */
        .gallery-thumbnails {
            display: flex; gap: 10px; padding: 14px 16px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            justify-content: center;
        }
        .gallery-thumbnails::-webkit-scrollbar { display: none; }
        .gallery-thumb {
            width: 48px; height: 48px; border-radius: 50%; overflow: hidden;
            border: 2px solid transparent; flex-shrink: 0; transition: all 0.25s;
            cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .gallery-thumb.active { border-color: #D14A61; box-shadow: 0 0 0 2px rgba(209,74,97,0.2); }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* ===== PRODUCT HEADER ===== */
        .product-header { padding: 16px 16px 12px; }
        .product-name-row { display: flex; align-items: center; gap: 10px; }
        .product-name {
            font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500;
            color: #1a1a1a; line-height: 1.3; flex: 1; min-width: 0; letter-spacing: -0.3px;
        }
        .action-bar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .action-btn {
            width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08), 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .action-btn:active { transform: scale(0.88); }
        .action-btn svg { width: 16px; height: 16px; stroke: #D14A61; fill: none; stroke-width: 1.8; transition: all 0.25s; }
        .action-btn.wish-active svg { stroke: #D14A61; fill: #D14A61; }
        .action-btn.wish-pop svg { animation: wishlistPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes wishlistPop {
            0% { transform: scale(1); }
            30% { transform: scale(1.35); }
            50% { transform: scale(0.9); }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* ===== KEY HIGHLIGHTS ===== */
        .key-highlights {
            padding: 16px; margin: 8px 16px; border-radius: 20px;
            background: linear-gradient(135deg, #fdf2f4 0%, #f0e6ff 50%, #e8f4fd 100%);
            position: relative; overflow: hidden;
        }
        .key-highlights::before {
            content: ''; position: absolute; top: -30%; right: -20%; width: 60%; height: 80%;
            background: radial-gradient(circle, rgba(209,74,97,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .highlights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; position: relative; z-index: 1; }
        @media (max-width: 359px) { .highlights-grid { grid-template-columns: 1fr; } }
        .highlight-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px; border-radius: 14px; min-width: 0;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .highlight-item.diamond-item { background: linear-gradient(135deg, #e0f2fe, #bae6fd); }
        .highlight-item.gold-item { background: linear-gradient(135deg, #fef9c3, #fde68a); }
        .highlight-item.pink-item { background: linear-gradient(135deg, #fdf2f4, #fecdd3); }
        .highlight-icon {
            width: 28px; height: 28px; min-width: 28px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .highlight-icon.gold-bg { background: rgba(184,134,11,0.15); }
        .highlight-icon.diamond-bg { background: rgba(59,130,246,0.12); }
        .highlight-icon.pink-bg { background: rgba(209,74,97,0.1); }
        .highlight-icon i { width: 14px; height: 14px; }
        .highlight-text { min-width: 0; overflow: hidden; }
        .highlight-text .hl-value { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .highlight-text .hl-value.diamond-text { color: #1e40af; }
        .highlight-text .hl-value.gold-text { color: #92400e; }
        .highlight-text .hl-value.pink-text { color: #be123c; }
        .highlight-text .hl-label { font-size: 9px; color: #777; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Shimmer effects */
        .price-shimmer {
            background: linear-gradient(90deg, #1a1a1a 0%, #1a1a1a 28%, #555 40%, #999 50%, #555 60%, #1a1a1a 72%, #1a1a1a 100%);
            background-size: 300% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }

        .warranty-row {
            display: flex; align-items: center; gap: 8px; margin-top: 12px;
            padding: 10px 12px; border-radius: 12px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(34,197,94,0.2);
        }
        .warranty-row i { width: 14px; height: 14px; color: #22C55E; flex-shrink: 0; }
        .warranty-row span { font-size: 11px; font-weight: 600; color: #166534; }
        .view-full-details-btn {
            display: flex; align-items: center; justify-content: space-between; gap: 6px;
            width: 100%; margin-top: 10px; padding: 10px 14px;
            font-size: 12px; font-weight: 700; color: #D14A61;
            border: none; border-radius: 100px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 2px 8px rgba(209,74,97,0.08);
            transition: all 0.2s;
        }
        .view-full-details-btn:active { transform: scale(0.98); background: rgba(253,242,244,0.9); }
        .view-full-details-btn svg { width: 13px; height: 13px; stroke: #D14A61; flex-shrink: 0; transition: transform 0.3s; }
        .view-full-details-btn.open svg { transform: rotate(45deg); }

        /* ===== FULL PRODUCT DETAILS ===== */
        .full-details-panel {
            max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0 16px; background: #fff; border-radius: 0 0 16px 16px;
        }
        .full-details-panel.open { max-height: 3000px; }
        .full-details-inner { padding: 16px; border: 1px solid #f0f0f0; border-top: none; border-radius: 0 0 16px 16px; }
        .detail-category { margin-bottom: 16px; }
        .detail-category:last-child { margin-bottom: 0; }
        .detail-cat-title {
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; margin-bottom: 8px; padding-bottom: 6px;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-cat-title.gold-title { color: #b8860b; }
        .detail-cat-title.diamond-title { color: #D14A61; }
        .detail-cat-title.general-title { color: #555; }
        .detail-rows { display: flex; flex-direction: column; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; gap: 12px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-row .dl { font-size: 12px; color: #777; flex-shrink: 0; }
        .detail-row .dv { font-size: 12px; font-weight: 600; color: #1a1a1a; text-align: right; word-break: break-word; }
        .product-description { margin-top: 16px; padding-top: 12px; border-top: 1px solid #f0f0f0; font-size: 13px; line-height: 1.7; color: #555; }

        /* ===== TRUST ELEMENTS ===== */
        .trust-elements {
            display: flex; align-items: stretch; justify-content: center; gap: 0;
            padding: 0; margin: 8px 16px; background: #fff; border-radius: 12px;
            border: 1px solid #f0f0f0; overflow: hidden;
        }
        .trust-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; padding: 12px 8px;
            border-right: 1px solid #f0f0f0;
        }
        .trust-item:last-child { border-right: none; }
        .trust-item img { height: 18px; width: auto; object-fit: contain; }

        /* ===== PRICE SECTION ===== */
        .price-section { padding: 16px; margin: 8px 16px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0; }
        .price-main-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .price-current { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; }
        .price-original { font-size: 14px; color: #999; text-decoration: line-through; }
        .price-discount { font-size: 12px; font-weight: 700; color: #22C55E; background: rgba(34,197,94,0.08); padding: 2px 8px; border-radius: 100px; }
        .price-tax { font-size: 11px; color: #999; margin-top: 4px; }
        .price-breakup-toggle {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; margin-top: 14px; padding: 10px 14px;
            border-radius: 100px; background: #FAFAFA; border: 1px solid #f0f0f0;
        }
        .price-breakup-toggle span { font-size: 12px; font-weight: 600; color: #555; display: flex; align-items: center; gap: 6px; }
        .price-breakup-toggle .toggle-arrow { transition: transform 0.3s; }
        .price-breakup-toggle.open .toggle-arrow { transform: rotate(180deg); }
        .price-breakup-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .price-breakup-panel.open { max-height: 600px; }
        .breakup-content { padding: 12px 0 0; }
        .breakup-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .breakup-row:last-child { border-bottom: none; }
        .breakup-label { font-size: 12px; color: #777; }
        .breakup-sub { font-size: 10px; color: #aaa; margin-top: 2px; }
        .breakup-value { font-size: 12px; font-weight: 700; color: #1a1a1a; text-align: right; }
        .breakup-total { border-top: 2px solid #f0f0f0; margin-top: 4px; padding-top: 12px; }
        .breakup-total .breakup-label { font-weight: 700; color: #1a1a1a; font-size: 13px; }
        .breakup-total .breakup-value { font-size: 15px; color: #1a1a1a; }

        /* Weight & Size Selection */
        .selection-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
        .selection-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .selection-label i { width: 7px; height: 7px; }
        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .pill {
            padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 600;
            border: 1.5px solid #e0e0e0; background: #fff; color: #555;
            transition: all 0.2s;
        }
        .pill.active { border-color: #D14A61; background: #FDF2F4; color: #D14A61; }
        .pill.notify-me { opacity: 0.5; border-style: dashed; cursor: pointer; }
        .pill:active { transform: scale(0.95); }
        .size-guide-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .size-guide-btn { font-size: 11px; font-weight: 600; color: #D14A61; text-decoration: underline; text-underline-offset: 2px; }

        /* ===== EXCHANGE GOLD ===== */
        .exchange-section { padding: 16px; margin: 8px 16px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0; }
        .exchange-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .exchange-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #fef3cd, #fde68a); display: flex; align-items: center; justify-content: center; }
        .exchange-icon i { width: 18px; height: 18px; color: #92400e; }
        .exchange-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .exchange-subtitle { font-size: 11px; color: #777; }
        .exchange-rate { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 100px; background: #fffbeb; border: 1px solid rgba(245,158,11,0.15); margin-bottom: 12px; font-size: 11px; color: #92400e; }
        .exchange-cta { width: 100%; padding: 12px; border-radius: 100px; font-size: 13px; font-weight: 600; color: #92400e; background: linear-gradient(135deg, #fef3cd, #fde68a); border: 1px solid rgba(184,134,11,0.2); transition: all 0.2s; }
        .exchange-cta:active { transform: scale(0.98); }

        /* ===== COUPONS (carousel) ===== */
        .coupons-section { padding: 16px 0; margin: 8px 0; }
        .coupons-header { padding: 0 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .coupons-header i { width: 18px; height: 18px; color: #D14A61; }
        .coupons-title { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .coupons-scroll {
            display: flex; gap: 10px; padding: 0 16px; overflow-x: auto;
            -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
            scroll-padding-left: 16px;
        }
        .coupons-scroll::-webkit-scrollbar { display: none; }
        .coupon-card {
            min-width: calc(100vw - 64px); max-width: 300px;
            padding: 14px 16px; border-radius: 14px; border: 1px solid #f0f0f0;
            background: #fff; scroll-snap-align: start; flex-shrink: 0;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .coupon-left { flex: 1; min-width: 0; }
        .coupon-code-badge { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 0.8px; padding: 3px 10px; border-radius: 100px; margin-bottom: 4px; }
        .coupon-code-badge.pink { color: #D14A61; background: #FDF2F4; }
        .coupon-code-badge.gold { color: #92400e; background: #fef3cd; }
        .coupon-code-badge.purple { color: #6d28d9; background: #f3e8ff; }
        .coupon-desc { font-size: 11px; color: #555; line-height: 1.4; }
        .coupon-view-btn { font-size: 10px; font-weight: 700; color: #D14A61; padding: 6px 14px; border-radius: 100px; border: 1px solid rgba(209,74,97,0.3); white-space: nowrap; transition: all 0.2s; }
        .coupon-view-btn:active { background: #FDF2F4; }

        /* ===== PROMOTIONS ===== */
        .promos-section { padding: 16px; margin: 8px 16px; background: #fff; border-radius: 16px; border: 1px solid #f0f0f0; }

        }
    </style>
</head>

        }).join("");
    }

    thumbs.addEventListener("click", function(e) { var b = e.target.closest("[data-idx]"); if (b) { state.currentSlide = parseInt(b.dataset.idx); render(); } });
    var main = document.getElementById("galleryMain");
    main.addEventListener("touchstart", function(e) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; currentX = startX; isDragging = true; hasMoved = false; track.classList.add("dragging"); }, { passive: true });
    main.addEventListener("touchmove", function(e) { if (!isDragging) return; currentX = e.touches[0].clientX; var diffX = currentX - startX; var diffY = e.touches[0].clientY - startY; if (Math.abs(diffX) > 12 || Math.abs(diffY) > 12) hasMoved = true; if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 5) { track.style.transform = "translateX(" + (-(state.currentSlide * main.offsetWidth) + diffX) + "px)"; } }, { passive: true });
    main.addEventListener("touchend", function() {
        isDragging = false; track.classList.remove("dragging");
        var diff = currentX - startX;
        if (Math.abs(diff) > 50) {
            if (diff > 50 && state.currentSlide > 0) state.currentSlide--;
            else if (diff < -50 && state.currentSlide < product.images.length - 1) state.currentSlide++;
        }
        currentX = 0; startX = 0; render();
    });

})();

// ===== LIGHTBOX =====
function openLightbox(idx) {
    var lb = document.getElementById("lightbox");
    var img = document.getElementById("lightboxImg");
    img.src = product.images[idx];
    document.getElementById("lightboxCounter").textContent = (idx + 1) + " / " + product.images.length;
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
    var lbIdx = idx, scale = 1, lastTap = 0;

    // Double tap to zoom
    lb.addEventListener("click", function(e) {
        if (e.target === document.getElementById("lightboxClose") || e.target.closest(".lightbox-close")) return;
        var now = Date.now();
        if (now - lastTap < 300) {
            scale = scale > 1 ? 1 : 2.5;
            img.style.transform = "scale(" + scale + ")";
        }
        lastTap = now;
    });

    // Pinch to zoom
    var initDist = 0;
    lb.addEventListener("touchstart", function(e) {
        if (e.touches.length === 2) {
            initDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }, { passive: true });
    lb.addEventListener("touchmove", function(e) {
        if (e.touches.length === 2) {
            var dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            scale = Math.min(4, Math.max(1, scale * (dist / initDist)));
            img.style.transform = "scale(" + scale + ")";
            initDist = dist;
        }
    }, { passive: true });

    // Swipe in lightbox (single finger, not zoomed)
    var lbStartX = 0, lbCurrentX = 0;
    lb.ontouchstart = function(e) { if (e.touches.length === 1 && scale <= 1) lbStartX = e.touches[0].clientX; lbCurrentX = lbStartX; };
    lb.ontouchmove = function(e) { if (e.touches.length === 1) lbCurrentX = e.touches[0].clientX; };
    lb.ontouchend = function(e) {
        if (scale > 1) return;
        var diff = lbCurrentX - lbStartX;
        if (diff > 60 && lbIdx > 0) lbIdx--;
        else if (diff < -60 && lbIdx < product.images.length - 1) lbIdx++;
        img.src = product.images[lbIdx];
        document.getElementById("lightboxCounter").textContent = (lbIdx + 1) + " / " + product.images.length;
        scale = 1; img.style.transform = "scale(1)";
    };
}

    body.innerHTML = '<p style="font-size:12px;color:#555;margin-bottom:16px">Calculate the exchange value of your old gold jewellery.</p><div class="form-group"><label class="form-label">Karatage</label><select class="form-select" id="exchKarat"><option value="">Select purity</option><option value="24">24 KT</option><option value="22">22 KT</option><option value="18">18 KT</option><option value="14">14 KT</option><option value="9">9 KT</option></select><p id="exchRateDisplay" style="font-size:11px;color:#92400e;margin-top:6px;display:none"></p></div><div class="form-group"><label class="form-label">Weight (grams)</label><input type="number" step="0.01" class="form-input" placeholder="Enter weight in grams" id="exchWeight"></div><button class="btn-primary" id="exchCalcBtn">Calculate Exchange Value</button><div id="exchLeadForm" style="display:none;margin-top:16px"><div class="form-group"><label class="form-label">Your Name</label><input type="text" class="form-input" placeholder="Enter your name" id="exchName"></div><div class="form-group"><label class="form-label">Mobile Number</label><input type="tel" maxlength="10" class="form-input" placeholder="10-digit number" id="exchPhone"></div><button class="btn-primary" id="exchSubmitBtn">Show Exchange Value</button></div><div id="exchResult" style="display:none;margin-top:16px;padding:16px;border-radius:14px;background:#f0fdf4;border:1px solid rgba(34,197,94,0.2);text-align:center"><p style="font-size:11px;color:#777;margin-bottom:4px">Approximate Exchange Value</p><p style="font-size:24px;font-weight:700;color:#166534;font-family:Fraunces,serif" id="exchValue"></p><p style="font-size:10px;color:#999;margin-top:8px;line-height:1.5">*Final exchange value may vary at the store based on actual purity testing and prevailing rates. This is an indicative estimate only.</p></div>';
    var rates = { "24": product.goldRate.rate24kt, "22": product.goldRate.rate22kt, "18": product.goldRate.rate18kt, "14": product.goldRate.rate14kt, "9": product.goldRate.rate9kt };
    document.getElementById("exchKarat").onchange = function() { var d = document.getElementById("exchRateDisplay"); if (this.value && rates[this.value]) { d.style.display = "block"; d.textContent = "Today's " + this.value + " KT rate: \u20B9" + rates[this.value].toLocaleString("en-IN") + "/gm"; } else d.style.display = "none"; };
    document.getElementById("exchCalcBtn").onclick = function() { if (!document.getElementById("exchKarat").value || !document.getElementById("exchWeight").value) { showToast("Please fill karatage and weight", "error"); return; } document.getElementById("exchLeadForm").style.display = "block"; this.style.display = "none"; };
    document.getElementById("exchSubmitBtn").onclick = function() { var n = document.getElementById("exchName").value, p = document.getElementById("exchPhone").value; if (!n || p.length !== 10) { showToast("Please fill valid name and 10-digit number", "error"); return; } var k = document.getElementById("exchKarat").value, w = parseFloat(document.getElementById("exchWeight").value); document.getElementById("exchValue").textContent = fmt(Math.round(rates[k] * w)); document.getElementById("exchResult").style.display = "block"; document.getElementById("exchLeadForm").style.display = "none"; showToast("Exchange value calculated", "success"); };
}

// ===== GIFT SHEET =====
function renderGiftSheet() {
    var body = document.getElementById("giftBody");
    var wraps = [{ name: "Mia Blush Wrap", placeholder: "#FDF2F4" }, { name: "Minimal Box", placeholder: "#f5f5f5" }, { name: "Festive Gold Wrap", placeholder: "#fef3cd" }];
    var stickers = ["Happy Birthday", "Congratulations", "With Love", "Just For You", "Best Wishes", "You Deserve This"];
    var h = '<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;padding:6px 14px;border-radius:100px;background:#f0fdf4;border:1px solid rgba(34,197,94,0.15);width:fit-content;margin-left:auto;margin-right:auto"><i data-lucide="sparkles" style="width:12px;height:12px;color:#22C55E"></i><span style="font-size:11px;font-weight:700;color:#166534">Complimentary Gifting Service. It\'s on us.</span></div>';
    h += '<div class="form-label">Choose Wrapper</div><div style="display:flex;gap:10px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">';
    wraps.forEach(function(w, i) { h += '<button class="gift-wrap-option" data-wrap="' + i + '" style="min-width:100px;padding:0;border-radius:14px;border:1.5px solid #e0e0e0;text-align:center;transition:all 0.2s;overflow:hidden"><div style="width:100%;height:80px;background:' + w.placeholder + ';display:flex;align-items:center;justify-content:center"><i data-lucide="gift" style="width:24px;height:24px;color:#bbb"></i></div><div style="padding:8px 6px;font-size:11px;font-weight:600;color:#1a1a1a">' + w.name + '</div></button>'; });
    h += '</div>';
    h += '<div class="form-label">Choose a Sticker</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px">';
    stickers.forEach(function(s, i) { h += '<button class="gift-sticker-option" data-sticker="' + i + '" style="padding:0;border-radius:12px;border:1.5px solid #e0e0e0;text-align:center;transition:all 0.2s;overflow:hidden"><div style="width:100%;height:56px;background:#FAFAFA;display:flex;align-items:center;justify-content:center"><i data-lucide="sticker" style="width:18px;height:18px;color:#bbb"></i></div><div style="padding:6px 4px;font-size:10px;font-weight:600;color:#555">' + s + '</div></button>'; });
    h += '</div><button class="btn-primary" id="giftSaveBtn">Make it a Gift & Add to Bag</button>';
    body.innerHTML = h;
    lucide.createIcons({ nodes: [body] });
    body.querySelectorAll(".gift-wrap-option").forEach(function(b) { b.onclick = function() { body.querySelectorAll(".gift-wrap-option").forEach(function(x) { x.style.borderColor = "#e0e0e0"; }); this.style.borderColor = "#D14A61"; }; });
    body.querySelectorAll(".gift-sticker-option").forEach(function(b) { b.onclick = function() { body.querySelectorAll(".gift-sticker-option").forEach(function(x) { x.style.borderColor = "#e0e0e0"; }); this.style.borderColor = "#D14A61"; }; });
    document.getElementById("giftSaveBtn").onclick = function() { closeSheet("gift"); showToast("Gift wrap applied & added to bag", "success"); };
}

// ===== PREBOOK SHEET =====

    product.prebookDates.forEach(function(d, i) { h += '<button class="prebook-date-opt" data-date="' + i + '" style="flex:1;padding:14px;border-radius:14px;border:1.5px solid #e0e0e0;text-align:center;font-size:13px;font-weight:600;color:#1a1a1a;transition:all 0.2s">' + d + '</button>'; });
    h += '</div><div style="margin-bottom:16px;padding:12px;border-radius:12px;background:#FAFAFA"><p style="font-size:11px;font-weight:700;color:#1a1a1a;margin-bottom:8px">A Little Pre-Book Prep:</p><ul style="font-size:11px;color:#555;line-height:1.8;padding-left:16px"><li>Once purchased, a pre-booked item cannot be cancelled.</li><li>Choosing "Pre-book" adds a label to all cart items. Remove it anytime.</li><li>You can change the date from cart or product page.</li><li>Pre-book is available for select pincodes and cities only.</li></ul></div>';
    h += '<button class="btn-primary" id="prebookConfirmBtn">Confirm Pre-Book for \u20B91,000</button>';
    body.innerHTML = h;
    body.querySelectorAll(".prebook-date-opt").forEach(function(b) { b.onclick = function() { body.querySelectorAll(".prebook-date-opt").forEach(function(x) { x.style.borderColor = "#e0e0e0"; x.style.background = "#fff"; }); this.style.borderColor = "#F59E0B"; this.style.background = "#fffbeb"; state.prebookDate = this.textContent; }; });
    document.getElementById("prebookConfirmBtn").onclick = function() { if (!state.prebookDate) { showToast("Please select a delivery date", "error"); return; } closeSheet("prebook"); showToast("Pre-booked for " + state.prebookDate, "success"); };
}

// ===== STORE SHEET =====
function renderStoreSheet() {

    document.getElementById("notifySubmitBtn").onclick = function() { var n = document.getElementById("notifyName").value, p = document.getElementById("notifyPhone").value; if (!n || p.length !== 10) { showToast("Please fill valid details", "error"); return; } body.innerHTML = '<div style="text-align:center;padding:20px 0"><i data-lucide="check-circle" style="width:32px;height:32px;color:#22C55E;margin:0 auto"></i><p style="font-size:14px;font-weight:600;margin-top:12px">You\'re on the list!</p><p style="font-size:12px;color:#777;margin-top:4px">We\'ll notify you when size ' + size + ' is back.</p></div>'; lucide.createIcons({ nodes: [body] }); showToast("You will be notified when available", "success"); };

["sizeGuide", "exchange", "prebook", "store", "notify", "coupon", "similar"].forEach(function(id) {
